name: PHP Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t php-app .

      - name: Wait for MySQL
        run: sleep 15

      - name: Run Migration
        run: |
          docker run --network host php-app \
          sh -c "apt-get update && apt-get install -y default-mysql-client && \
          mysql -h 127.0.0.1 -uroot -proot test_db < database.sql"

      - name: Run Tests
        run: |
          docker run --network host php-app php test.php